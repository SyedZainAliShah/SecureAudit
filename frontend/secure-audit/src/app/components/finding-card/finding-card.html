<div class="finding-card" [class]="finding.severity" (click)="toggle()">
  <div class="card-header">
    <div class="left">
      <span class="severity-badge" [class]="finding.severity">{{ severityLabel }}</span>
      <span class="category">{{ finding.category }}</span>
    </div>
    <div class="right">
      @if (finding.line_reference) {
        <span class="line-ref">{{ finding.line_reference }}</span>
      }
      <span class="chevron" [class.open]="expanded">
        <svg viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>
  </div>

  <div class="card-title">{{ finding.title }}</div>

  @if (expanded) {
    <div class="card-body">
      <div class="section">
        <h4>Issue</h4>
        <p>{{ finding.description }}</p>
      </div>
      <div class="section recommendation">
        <h4>Recommendation</h4>
        <p>{{ finding.recommendation }}</p>
      </div>
    </div>
  }
</div>
